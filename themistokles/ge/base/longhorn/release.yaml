apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
spec:
  interval: 10m
  timeout: 20m
  targetNamespace: longhorn-system
  install:
    createNamespace: false
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  chart:
    spec:
      chart: longhorn
      version: v1.11.1
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: longhorn-system
