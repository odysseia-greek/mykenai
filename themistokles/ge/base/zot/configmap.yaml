apiVersion: v1
kind: ConfigMap
metadata:
  name: zot-config
data:
  config.json: |
    {
      "distSpecVersion": "1.1.0",
      "storage": {
        "rootDirectory": "/var/lib/zot",
        "gc": true,
        "dedupe": true
      },
      "http": {
        "address": "0.0.0.0",
        "port": "5000",
        "realm": "zot",
        "compat": [
          "docker2s2"
        ],
        "auth": {
          "failDelay": 5,
          "htpasswd": {
            "path": "/etc/zot/auth/htpasswd"
          }
        }
      },
      "log": {
        "level": "info"
      },
      "extensions": {
        "search": {
          "enable": true
        },
        "sync": {
          "enable": true,
          "registries": [
            {
              "urls": [
                "https://docker.elastic.co"
              ],
              "onDemand": true,
              "tlsVerify": true,
              "maxRetries": 3,
              "retryDelay": "5m",
              "content": [
                {
                  "prefix": "**",
                  "destination": "/elastic"
                }
              ]
            },
            {
              "urls": ["https://docker.io/library"],
              "onDemand": false,
              "pollInterval": "12h",
              "content": [
                {
                  "prefix": "/golang",
                  "tags": { "regex": "^1.25-alpine$" }
                },
                {
                  "prefix": "/alpine",
                  "tags": { "regex": "^3.23.2$" }
                },
                {
                  "prefix": "/debian",
                  "tags": { "regex": "^trixie-slim$" }
                }
              ]
            },
            {
              "urls": [
                "https://docker.io/hashicorp"
              ],
              "onDemand": true,
              "tlsVerify": true,
              "maxRetries": 3,
              "retryDelay": "5m",
              "content": [
                {
                  "prefix": "**",
                  "destination": "/hashicorp"
                }
              ]
            }
          ]
        },
        "ui": {
          "enable": true
        }
      }
    }
