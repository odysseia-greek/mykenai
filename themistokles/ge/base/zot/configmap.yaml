apiVersion: v1
kind: ConfigMap
metadata:
  name: zot-config
data:
  config.json: |
    {
      "distSpecVersion": "1.1.0",
      "storage": {
        "rootDirectory": "/var/lib/zot",
        "gc": true,
        "dedupe": true
      },
      "http": {
        "address": "0.0.0.0",
        "port": "5000",
        "realm": "zot",
        "auth": {
          "failDelay": 5,
          "htpasswd": {
            "path": "/etc/zot/auth/htpasswd"
          }
        }
      },
      "log": {
        "level": "info"
      }
    }
