apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph-cluster
spec:
  interval: 10m
  timeout: 30m
  targetNamespace: rook-ceph
  dependsOn:
    - name: rook-ceph
  install:
    createNamespace: false
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
  chart:
    spec:
      chart: rook-ceph-cluster
      sourceRef:
        kind: HelmRepository
        name: rook-ceph
        namespace: rook-ceph
  values:
    operatorNamespace: rook-ceph
    toolbox:
      enabled: true
    monitoring:
      enabled: false
    cephFileSystems: []
    cephObjectStores: []
    cephObjectStoreUsers: []
    cephFilesystemSubVolumeGroups: []
    cephBlockPools:
      - name: pyxis
        spec:
          failureDomain: host
          replicated:
            size: 3
        storageClass:
          enabled: true
          name: pyxis
          isDefault: true
          reclaimPolicy: Delete
          allowVolumeExpansion: true
          volumeBindingMode: WaitForFirstConsumer
      - name: kibotos
        spec:
          failureDomain: host
          replicated:
            size: 3
        storageClass:
          enabled: true
          name: kibotos
          isDefault: false
          reclaimPolicy: Retain
          allowVolumeExpansion: true
          volumeBindingMode: WaitForFirstConsumer
    cephClusterSpec:
      dataDirHostPath: /var/lib/rook
      crashCollector:
        disable: true
      mon:
        count: 2
        allowMultiplePerNode: false
      mgr:
        count: 1
        allowMultiplePerNode: false
      dashboard:
        enabled: true
      storage:
        useAllNodes: false
        useAllDevices: false
