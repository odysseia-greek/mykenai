apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: tekton-dashboard
  namespace: tekton-pipelines
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`tekton.hellenistike.odysseia-greek`)
      kind: Rule
      services:
        - name: tekton-dashboard
          port: 9097
