apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor
spec:
  values:
    expose:
      type: ingress
      tls:
        enabled: false
      ingress:
        className: traefik
        hosts:
          core: harbor.hellenistike.odysseia-greek
    externalURL: http://harbor.hellenistike.odysseia-greek
    harborAdminPassword: change-me-before-bootstrap
    trivy:
      enabled: false
    persistence:
      persistentVolumeClaim:
        registry:
          storageClass: longhorn
          size: 20Gi
        jobservice:
          storageClass: longhorn
          size: 2Gi
        database:
          storageClass: longhorn
          size: 5Gi
        redis:
          storageClass: longhorn
          size: 2Gi
        trivy:
          storageClass: longhorn
          size: 5Gi
