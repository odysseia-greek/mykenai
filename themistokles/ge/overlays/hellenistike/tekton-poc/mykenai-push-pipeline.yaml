apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: print-github-push
  namespace: tekton-pipelines
spec:
  params:
    - name: git-url
      type: string
    - name: git-ref
      type: string
    - name: git-revision
      type: string
    - name: commit-message
      type: string
    - name: commit-author
      type: string
    - name: commit-url
      type: string
  steps:
    - name: print
      image: alpine:3.20
      env:
        - name: GIT_URL
          value: $(params.git-url)
        - name: GIT_REF
          value: $(params.git-ref)
        - name: GIT_REVISION
          value: $(params.git-revision)
        - name: COMMIT_MESSAGE
          value: $(params.commit-message)
        - name: COMMIT_AUTHOR
          value: $(params.commit-author)
        - name: COMMIT_URL
          value: $(params.commit-url)
      script: |
        #!/bin/sh
        set -eu

        echo "hello from tekton"
        echo "repository: ${GIT_URL}"
        echo "ref: ${GIT_REF}"
        echo "revision: ${GIT_REVISION}"
        echo "author: ${COMMIT_AUTHOR}"
        echo "message: ${COMMIT_MESSAGE}"
        echo "url: ${COMMIT_URL}"
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: mykenai-main-push
  namespace: tekton-pipelines
spec:
  params:
    - name: git-url
      type: string
    - name: git-ref
      type: string
    - name: git-revision
      type: string
    - name: commit-message
      type: string
    - name: commit-author
      type: string
    - name: commit-url
      type: string
  tasks:
    - name: print-push
      taskRef:
        name: print-github-push
      params:
        - name: git-url
          value: $(params.git-url)
        - name: git-ref
          value: $(params.git-ref)
        - name: git-revision
          value: $(params.git-revision)
        - name: commit-message
          value: $(params.commit-message)
        - name: commit-author
          value: $(params.commit-author)
        - name: commit-url
          value: $(params.commit-url)
