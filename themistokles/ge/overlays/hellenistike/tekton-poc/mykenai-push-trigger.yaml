apiVersion: v1
kind: ServiceAccount
metadata:
  name: mykenai-push-listener
  namespace: tekton-pipelines
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mykenai-push-listener
  namespace: tekton-pipelines
rules:
  - apiGroups:
      - tekton.dev
    resources:
      - pipelineruns
    verbs:
      - create
  - apiGroups:
      - triggers.tekton.dev
    resources:
      - eventlisteners
      - triggers
      - triggerbindings
      - triggertemplates
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - ""
    resources:
      - configmaps
      - secrets
      - serviceaccounts
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mykenai-push-listener
  namespace: tekton-pipelines
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mykenai-push-listener
subjects:
  - kind: ServiceAccount
    name: mykenai-push-listener
    namespace: tekton-pipelines
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: mykenai-main-push
  namespace: tekton-pipelines
spec:
  params:
    - name: git-url
      value: $(body.repository.clone_url)
    - name: git-ref
      value: $(body.ref)
    - name: git-revision
      value: $(body.after)
    - name: commit-message
      value: $(body.head_commit.message)
    - name: commit-author
      value: $(body.head_commit.author.name)
    - name: commit-url
      value: $(body.head_commit.url)
---
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: mykenai-main-push
  namespace: tekton-pipelines
spec:
  params:
    - name: git-url
    - name: git-ref
    - name: git-revision
    - name: commit-message
    - name: commit-author
    - name: commit-url
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: mykenai-main-push-
      spec:
        pipelineRef:
          name: mykenai-main-push
        params:
          - name: git-url
            value: $(tt.params.git-url)
          - name: git-ref
            value: $(tt.params.git-ref)
          - name: git-revision
            value: $(tt.params.git-revision)
          - name: commit-message
            value: $(tt.params.commit-message)
          - name: commit-author
            value: $(tt.params.commit-author)
          - name: commit-url
            value: $(tt.params.commit-url)
---
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: mykenai-main-push
  namespace: tekton-pipelines
spec:
  serviceAccountName: mykenai-push-listener
  triggers:
    - name: github-main-push
      interceptors:
        - ref:
            name: cel
          params:
            - name: filter
              value: "header.match('X-GitHub-Event', 'push') && body.repository.full_name == 'odysseia-greek/mykenai' && body.ref == 'refs/heads/main'"
      bindings:
        - ref: mykenai-main-push
      template:
        ref: mykenai-main-push
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: mykenai-push-listener
  namespace: tekton-pipelines
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`tekton-webhook.hellenistike.odysseia-greek`)
      kind: Rule
      services:
        - name: el-mykenai-main-push
          port: 8080
