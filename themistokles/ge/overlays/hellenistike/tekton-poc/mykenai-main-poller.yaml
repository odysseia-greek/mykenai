apiVersion: v1
kind: ServiceAccount
metadata:
  name: mykenai-main-poller
  namespace: tekton-pipelines
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mykenai-main-poller
  namespace: tekton-pipelines
rules:
  - apiGroups:
      - ""
    resources:
      - configmaps
    verbs:
      - get
      - create
      - patch
      - update
  - apiGroups:
      - tekton.dev
    resources:
      - pipelineruns
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mykenai-main-poller
  namespace: tekton-pipelines
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mykenai-main-poller
subjects:
  - kind: ServiceAccount
    name: mykenai-main-poller
    namespace: tekton-pipelines
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mykenai-main-poller
  namespace: tekton-pipelines
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: mykenai-main-poller
          restartPolicy: OnFailure
          containers:
            - name: poll
              image: alpine/k8s:1.30.14
              imagePullPolicy: IfNotPresent
              env:
                - name: REPO
                  value: odysseia-greek/mykenai
                - name: BRANCH
                  value: main
                - name: STATE_CONFIGMAP
                  value: mykenai-main-poll-state
              command:
                - /bin/sh
                - -ceu
                - |
                  namespace="$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace)"
                  api_url="https://api.github.com/repos/${REPO}/commits/${BRANCH}"
                  repo_url="https://github.com/${REPO}.git"
                  ref="refs/heads/${BRANCH}"

                  latest="$(
                    curl -fsSL \
                      -H "Accept: application/vnd.github+json" \
                      "${api_url}" |
                      sed -n 's/^[[:space:]]*"sha": "\([0-9a-f]*\)",$/\1/p' |
                      head -n1
                  )"

                  if [ -z "${latest}" ]; then
                    echo "could not determine latest revision for ${REPO}@${BRANCH}"
                    exit 1
                  fi

                  previous="$(
                    kubectl get configmap "${STATE_CONFIGMAP}" \
                      --namespace="${namespace}" \
                      -o jsonpath='{.data.lastRevision}' 2>/dev/null || true
                  )"

                  if [ "${latest}" = "${previous}" ]; then
                    echo "no change for ${REPO}@${BRANCH}: ${latest}"
                    exit 0
                  fi

                  echo "change detected for ${REPO}@${BRANCH}: ${previous:-<none>} -> ${latest}"

                  cat <<EOF | kubectl create -f -
                  apiVersion: tekton.dev/v1
                  kind: PipelineRun
                  metadata:
                    generateName: mykenai-main-poll-
                    namespace: ${namespace}
                    labels:
                      app.kubernetes.io/name: mykenai-main-poller
                      odysseia-greek/repo: mykenai
                  spec:
                    pipelineRef:
                      name: mykenai-main-push
                    params:
                      - name: git-url
                        value: ${repo_url}
                      - name: git-ref
                        value: ${ref}
                      - name: git-revision
                        value: ${latest}
                      - name: commit-message
                        value: polled main change
                      - name: commit-author
                        value: github-poller
                      - name: commit-url
                        value: https://github.com/${REPO}/commit/${latest}
                  EOF

                  kubectl create configmap "${STATE_CONFIGMAP}" \
                    --namespace="${namespace}" \
                    --from-literal=lastRevision="${latest}" \
                    --dry-run=client -o yaml |
                    kubectl apply -f -
