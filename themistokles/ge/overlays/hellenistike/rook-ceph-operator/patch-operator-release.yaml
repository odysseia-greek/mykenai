apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rook-ceph
spec:
  values:
    tolerations:
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    csi:
      rookUseCsiOperator: true
      enableRbdDriver: true
      enableCephfsDriver: false
      enableCephfsSnapshotter: false
      enableRBDSnapshotter: false
      enableNFSSnapshotter: false
      enableCSIHostNetwork: false
      provisionerReplicas: 1
      kubeletDirPath: /var/lib/k0s/kubelet
      nfs:
        enabled: false
      csiAddons:
        enabled: false
      csiRBDProvisionerResource: |
        - name : csi-provisioner
          resource:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
        - name : csi-resizer
          resource:
            requests:
              memory: 64Mi
              cpu: 25m
            limits:
              memory: 128Mi
        - name : csi-attacher
          resource:
            requests:
              memory: 64Mi
              cpu: 25m
            limits:
              memory: 128Mi
        - name : csi-snapshotter
          resource:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
        - name : csi-rbdplugin
          resource:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
        - name : liveness-prometheus
          resource:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
      csiRBDPluginResource: |
        - name : driver-registrar
          resource:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
        - name : csi-rbdplugin
          resource:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
        - name : liveness-prometheus
          resource:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
      csiCephFSProvisionerResource: |
        - name : csi-provisioner
          resource:
            requests:
              memory: 64Mi
              cpu: 25m
            limits:
              memory: 128Mi
        - name : csi-resizer
          resource:
            requests:
              memory: 64Mi
              cpu: 25m
            limits:
              memory: 128Mi
        - name : csi-attacher
          resource:
            requests:
              memory: 64Mi
              cpu: 25m
            limits:
              memory: 128Mi
        - name : csi-snapshotter
          resource:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
        - name : csi-cephfsplugin
          resource:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
        - name : liveness-prometheus
          resource:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
      csiCephFSPluginResource: |
        - name : driver-registrar
          resource:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
        - name : csi-cephfsplugin
          resource:
            requests:
              memory: 128Mi
              cpu: 50m
            limits:
              memory: 256Mi
        - name : liveness-prometheus
          resource:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
      provisionerTolerations:
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      pluginTolerations:
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 256Mi
