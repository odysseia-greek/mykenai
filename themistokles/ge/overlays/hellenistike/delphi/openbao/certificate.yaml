apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: vault-server
spec:
  secretName: vault-server-tls
  duration: 2160h
  renewBefore: 168h
  privateKey:
    algorithm: RSA
    size: 2048
  usages:
    - server auth
  dnsNames:
    - vault
    - vault.delphi
    - vault.delphi.svc
    - vault.delphi.svc.cluster.local
  issuerRef:
    name: delphi-internal
    kind: Issuer
