apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: openbao-server
spec:
  secretName: openbao-server-tls
  duration: 2160h
  renewBefore: 168h
  privateKey:
    algorithm: RSA
    size: 2048
  usages:
    - server auth
  dnsNames:
    - openbao
    - openbao.delphi
    - openbao.delphi.svc
    - openbao.delphi.svc.cluster.local
  issuerRef:
    name: delphi-internal
    kind: Issuer
