---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kaniko
  namespace: flux-system
spec:
  interval: 4h
  retryInterval: 2m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: themistokles
  dependsOn:
    - name: zot
  path: themistokles/ge/overlays/hellenistike/kaniko
  prune: true
  wait: true
  decryption:
    provider: sops
    secretRef:
      name: sops-gpg
