---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: delphi
  namespace: flux-system
spec:
  interval: 4h
  retryInterval: 2m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: themistokles
  dependsOn:
    - name: cert-manager
    - name: rook-ceph
  path: themistokles/ge/overlays/hellenistike/delphi
  prune: true
  wait: true
