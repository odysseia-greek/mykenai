---
- name: Rotate Raspberry Pi user password
  hosts: poleis
  become: yes
  serial: 1
  vars:
    raspberry_user: "{{ ansible_user | default('pi') }}"
  tasks:
    - name: Update Raspberry Pi user password
      ansible.builtin.user:
        name: "{{ raspberry_user }}"
        password: "{{ raspberry_password_hash }}"
        update_password: always
      no_log: true
