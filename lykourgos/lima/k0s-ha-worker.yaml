# Lima configuration for k0s HA worker nodes
# Start multiple workers with different names
#
# Worker 1:
#   limactl start --name=trapezous lykourgos/lima/k0s-ha-worker.yaml
# Worker 2:
#   limactl start --name=nikaia lykourgos/lima/k0s-ha-worker.yaml

vmType: "vz"
os: "Linux"

images:
  - location: "https://cloud.debian.org/images/cloud/trixie/latest/debian-13-genericcloud-arm64.qcow2"
    arch: "aarch64"

cpus: 3
memory: "6GiB"
disk: "40GiB"

networks:
  - lima: shared

mounts:
  - location: "~"
    writable: false

hostResolver:
  enabled: false

dns:
  - 8.8.8.8
  - 1.1.1.1

additionalDisks:
  - name: pyxis-worker
    format: false

message: |
  k0s worker VM is ready. Run Ansible from lykourgos/ansible to join it to the cluster.
