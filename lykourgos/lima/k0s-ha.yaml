# Lima configuration for HA k0s cluster (1 controller + 2 workers)
# Usage:
#   limactl start --name=byzantion lykourgos/lima/k0s-ha.yaml
#   limactl start --name=trapezous lykourgos/lima/k0s-ha-worker.yaml
#   limactl start --name=nikaia lykourgos/lima/k0s-ha-worker.yaml

vmType: "vz"
os: "Linux"

images:
  - location: "https://cloud.debian.org/images/cloud/trixie/latest/debian-13-genericcloud-arm64.qcow2"
    arch: "aarch64"

cpus: 4
memory: "8GiB"
disk: "50GiB"

networks:
  - lima: shared

portForwards:
  - guestPort: 6443
    hostPort: 6443
    proto: tcp

  - guestPort: 30080
    hostPort: 4900
    proto: tcp

  - guestPort: 30443
    hostPort: 8443
    proto: tcp

mounts:
  - location: "~"
    writable: false

hostResolver:
  enabled: false

dns:
  - 8.8.8.8
  - 1.1.1.1

additionalDisks:
  - name: pyxis-byzantion
    format: false

message: |
  k0s HA controller VM is ready. Run Ansible from lykourgos/ansible to install k0s.
